<!-- HERO -->
<section class="hero small-hero">

<h1>FORTNITE ACCOUNTS</h1>

<span>STACKED, OG & EMAIL-CHANGEABLE ACCOUNTS</span>

</section>

<!-- PRODUCTS -->
<section class="featured">

<div class="product-container">

<!-- ACCOUNT 1 -->
<div class="product-card">

<img src="images/take-the-L.png" alt="81 Skins Account">

<h3>81 SKINS TAKE THE L</h3>

<p>$35</p>

<button class="btn"
onclick="openPreview([
'images/skins1.png',
'images/backbling1.png',
'images/emotes1.png',
'images/exclusives1.png'
])">
PREVIEW
</button>

<button
onclick="window.open('https://buy.stripe.com/aFabJ09wu7WL2G37jhe3e03', '_blank')"
class="btn">
BUY NOW
</button>

<!-- ACCOUNT 2 -->
<div class="product-card">

<img src="images/skins2.png" alt="112 Sweat Account">

<h3>112 SWEAT ACCOUNT</h3>

<p>$25</p>

<button class="btn"
onclick="openPreview([
'images/skins2.png',
'images/backbling2.png',
'images/emotes2.png',
'images/exclusives2.png'
])">

</button>

<button
onclick="window.open('placeholder', '_blank')"

</button>

<!-- PREVIEW PANEL -->
<div id="previewPanel" class="preview-panel">

<div class="preview-header">
<h2>Account Preview</h2>
<span onclick="closePreview()" class="close-btn">&times;</span>
</div>

<img id="mainPreviewImg" src="">

<div class="thumbs" id="thumbsContainer"></div>

</div>

<!-- FOOTER -->
<footer>
<p>© 2026 OrbitX. All Rights Reserved.</p>
</footer>

<script>

function openPreview(images){

    document.getElementById("previewPanel").style.right = "0";

    document.getElementById("mainPreviewImg").src = images[0];

    let thumbs = document.getElementById("thumbsContainer");

    thumbs.innerHTML = "";

    images.forEach(img => {

        thumbs.innerHTML += `
            <img src="${img}"
            onclick="changeImg('${img}')">
        `;

    });

}

function closePreview(){

    document.getElementById("previewPanel").style.right = "-420px";

}

function changeImg(src){

    document.getElementById("mainPreviewImg").src = src;

}

</script>
